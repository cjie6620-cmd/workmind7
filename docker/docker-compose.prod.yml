# 生产全栈 Compose
# 启动：docker compose -f docker-compose.prod.yml up -d
# 需先配置 .env（参考 server-py/.env.example）

name: workmind7-prod

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${WM_PG_USER:-workmind}
      POSTGRES_PASSWORD: ${WM_PG_PASSWORD:-workmind_dev}
      POSTGRES_DB: ${WM_PG_DB:-workmind_vector}
    volumes:
      - wm_pg_data:/var/lib/postgresql/data
      - ../sql/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WM_PG_USER:-workmind}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${WM_REDIS_PASSWORD:-workmind_dev}
    volumes:
      - wm_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${WM_REDIS_PASSWORD:-workmind_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: ../server-py
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-3001}:3001"
    env_file:
      - ../server-py/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${WM_PG_USER:-workmind}:${WM_PG_PASSWORD:-workmind_dev}@postgres:5432/${WM_PG_DB:-workmind_vector}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${WM_REDIS_PASSWORD:-workmind_dev}
      APP_ENV: production
      AUTH_ENABLED: "true"
    volumes:
      - wm_uploads:/app/uploads
      - wm_hf_cache:/data/huggingface_cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  wm_pg_data:
  wm_redis_data:
  wm_uploads:
  wm_hf_cache:
