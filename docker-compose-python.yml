# docker-compose-python.yml
# 一键启动：Python 后端 + Chroma 向量数据库
# 使用命令：docker-compose -f docker-compose-python.yml up -d

version: '3.9'

services:
  # ── Python 后端服务 ────────────────────────────────────────
  server-py:
    build:
      context: ./server-py
      dockerfile: Dockerfile
    container_name: workmind-server-py
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - CHROMA_URL=http://chroma:8000
      - ALLOWED_ORIGINS=http://localhost:5173
    depends_on:
      chroma:
        condition: service_started
    volumes:
      - ./server-py/uploads:/app/uploads
    networks:
      - workmind-net

  # ── Chroma 向量数据库（RAG 模块用）────────────────────────
  chroma:
    image: chromadb/chroma:latest
    container_name: workmind-chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - workmind-net

volumes:
  chroma-data:

networks:
  workmind-net:
    driver: bridge
